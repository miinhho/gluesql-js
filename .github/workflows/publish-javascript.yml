name: Publish JavaScript

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA
        type: string
        required: true
      dry_run:
        description: Dry run
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_RELEASE_OPT_LEVEL: s

jobs:
  build_native_artifacts:
    name: native ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: win32-x64-msvc
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.sha }}

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build native package
        run: npm run build:node -- --target ${{ matrix.target }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v6
        with:
          name: native-${{ matrix.artifact }}
          path: gluesql_js.*.node
          if-no-files-found: error

  publish_to_npm:
    name: to npm
    runs-on: ubuntu-latest
    needs: build_native_artifacts
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.sha }}
      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - name: Set up wasm pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"
      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Download native artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          pattern: native-*
          merge-multiple: true

      - name: Build package files
        run: |
          npm run build:web
          npm run build:node -- --target x86_64-unknown-linux-gnu
          npx napi artifacts --output-dir artifacts --npm-dir npm

      - name: Verify package contents
        if: github.event.inputs.dry_run == 'true'
        shell: bash
        run: |
          npx napi pre-publish --npm-dir npm --skip-optional-publish
          for package_dir in npm/*; do
            (cd "$package_dir" && npm publish --provenance --dry-run)
          done
          npm publish --provenance --dry-run

      - name: Publish packages
        if: github.event.inputs.dry_run != 'true'
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          npx napi pre-publish --npm-dir npm
          npm publish --provenance
