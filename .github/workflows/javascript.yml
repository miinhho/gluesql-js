name: JavaScript

on:
  push:
    branches: [main, release-*]
    paths-ignore:
      - "docs/**"
  pull_request:
    paths-ignore:
      - "docs/**"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  rust_checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --workspace --target wasm32-unknown-unknown --locked

      - name: Check Node.js binding
        run: cargo check -p gluesql-js --no-default-features --features nodejs --locked

      - name: Run clippy
        run: cargo clippy --workspace --target wasm32-unknown-unknown --locked --all-targets

      - name: Run Node.js binding clippy
        run: cargo clippy -p gluesql-js --no-default-features --features nodejs --locked --all-targets

  js_build:
    name: Web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Set up wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"

      - name: Build web package
        run: npm run build:web

  js_node_tests:
    name: Node.js (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            test: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            test: true
          - os: macos-latest
            target: aarch64-apple-darwin
            test: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            test: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build Node.js package
        run: npm run build:node -- --target ${{ matrix.target }}

      - name: Test Node.js package
        if: matrix.test
        run: npm run test:node

  js_browser_tests:
    name: Browser tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: browser-actions/setup-firefox@latest

      - name: Set up wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"

      - name: Test JavaScript package
        run: wasm-pack test --headless --firefox . -p gluesql-js

  js_storage_tests:
    name: Storage tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: browser-actions/setup-firefox@latest

      - name: Set up wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"

      - name: Test WebStorage
        run: wasm-pack test --headless --firefox storages/web-storage

      - name: Test IndexedDB storage
        run: WASM_BINDGEN_TEST_TIMEOUT=60 wasm-pack test --headless --firefox storages/idb-storage
